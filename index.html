<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Westeros: Obsidian Dynasty</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc33; 
            --glow: rgba(255, 204, 51, 0.4); 
            --bg: #020202; 
            --line-dark: #2a220a; /* Darker, sophisticated line color */
        }
        
        body { 
            margin: 0; background: var(--bg); color: var(--gold); 
            font-family: 'Cinzel', serif; overflow: hidden;
        }

        #stars-far {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.3; z-index: -2;
        }
        #stars-near {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            background-image: radial-gradient(2px 2px at 50px 160px, var(--gold), rgba(0,0,0,0));
            background-size: 400px 400px; opacity: 0.15; z-index: -1;
        }

        .ui-panel { position: absolute; z-index: 100; }
        .top-right { top: 30px; right: 30px; display: flex; gap: 15px; }
        .top-left { top: 30px; left: 30px; border-left: 3px solid var(--gold); padding-left: 15px; }

        button { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 24px; cursor: pointer; font-family: 'Cinzel'; transition: 0.4s;
            text-transform: uppercase; font-size: 0.8em; letter-spacing: 2px;
        }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--glow); }

        #team-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: rgba(5,5,5,0.98); border: 1px solid var(--gold);
            padding: 40px; display: none; z-index: 3000; text-align: center;
            box-shadow: 0 0 100px #000, 0 0 20px var(--glow);
        }
        .team-list { 
            font-family: 'Quicksand', sans-serif; font-size: 1.1em;
            letter-spacing: 3px; line-height: 2.8; color: #fff; margin: 30px 0;
        }

        #stat-card {
            position: fixed; visibility: hidden; width: 320px;
            background: #000; border: 1px solid var(--gold);
            z-index: 2000; pointer-events: none;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 15px rgba(255,204,51,0.05);
        }
        .card-header { height: 200px; position: relative; border-bottom: 1px solid var(--gold); background: #080808; overflow: hidden; }
        .char-img { position: absolute; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; z-index: 1; }
        .house-mini { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; z-index: 3; filter: drop-shadow(0 0 8px #000); }
        .card-body { padding: 25px; background: #050505; }
        .card-name { font-size: 1.5em; color: #fff; letter-spacing: 2px; display: block; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .card-row { font-size: 0.82em; margin-bottom: 12px; font-family: 'Quicksand', sans-serif; display: flex; }
        .card-label { color: var(--gold); font-weight: bold; width: 100px; text-transform: uppercase; font-size: 0.65em; letter-spacing: 1.5px; flex-shrink: 0; }
        .card-val { color: #eee; line-height: 1.4; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; z-index: 2900; backdrop-filter: blur(5px); }
        
        line { 
            stroke: var(--line-dark); 
            stroke-width: 1.5px; 
            opacity: 0.8; 
            transition: stroke 0.3s;
        }
    </style>
</head>
<body>

<div id="stars-far"></div>
<div id="stars-near"></div>

<div class="ui-panel top-left">
    <h1 style="margin:0; font-size: 1.3em; letter-spacing: 5px;">GRAND LINEAGE</h1>
</div>

<div class="ui-panel top-right">
    <button onclick="resetView()">Recenter</button>
    <button onclick="toggleTeam()">Project Team</button>
</div>

<div class="overlay" id="overlay" onclick="toggleTeam()"></div>
<div id="team-modal">
    <h2 style="letter-spacing: 4px; color: var(--gold); font-size: 1.2em;">PROJECT TEAM</h2>

<div id="stat-card">

    </div>
    <div class="card-body">

const nodes = data.nodes;
const links = nodes.filter(d => d.parent).map(d => ({ source: d.parent, target: d.id }));

// 1. Pre-randomize positions to prevent overlap at spawn
nodes.forEach(d => {
    d.x = (Math.random() - 0.5) * width;
    d.y = (Math.random() - 0.5) * height;
});

const zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", e => {
    g.attr("transform", e.transform);
    d3.select("#stars-far").style("transform", `translate(${e.transform.x * 0.05}px, ${e.transform.y * 0.05}px)`);
    d3.select("#stars-near").style("transform", `translate(${e.transform.x * 0.1}px, ${e.transform.y * 0.1}px)`);
});

const svg = d3.select("#viz").append("svg").attr("viewBox", [-width/2, -height/2, width, height]).call(zoom);
const g = svg.append("g");

// 2. Strong physics to prevent intersections
const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id)
        .distance(d => d.source.type === 'center' ? 300 : 150)
        .strength(1))
    .force("charge", d3.forceManyBody().strength(-4000)) 
    .force("collide", d3.forceCollide().radius(d => d.size + 40).iterations(3)) // High collision radius keeps lines clear
    .force("x", d3.forceX(0).strength(0.05))
    .force("y", d3.forceY(0).strength(0.05));

const link = g.append("g").selectAll("line").data(links).join("line");

const node = g.append("g").selectAll("g").data(nodes).join("g")
    .call(d3.drag()
        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("mouseenter", showCard).on("mouseleave", hideCard);

node.append("circle").attr("r", d=>d.size/2).attr("fill", "#000").attr("stroke", "var(--gold)").attr("stroke-width", 2);

node.append("clipPath").attr("id", d=>"clip-"+d.id).append("circle").attr("r", d=>d.size/2);

node.append("image")
    .attr("xlink:href", d => d.img || "https://img.icons8.com/color/100/user-male-circle.png")
    .attr("clip-path", d => `url(#clip-${d.id})`)
    .attr("x", d => -d.size/2).attr("y", d => -d.size/2)
    .attr("width", d => d.size).attr("height", d => d.size)
    .attr("preserveAspectRatio", "xMidYMid slice");

simulation.on("tick", () => {
    // Keep IT at the absolute center
    const it = nodes.find(n => n.id === "IT");
    if(it) { it.x = 0; it.y = 0; }

    link.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
});

svg.call(zoom.transform, d3.zoomIdentity.scale(0.5));

function showCard(e, d) {
    if(d.id === 'IT') return;
    const card = d3.select("#stat-card");
    d3.select("#c-name").text(d.name);
    
    if(d.type === 'house') {
        d3.select("#p-content").style("display", "none");
        d3.select("#h-content").style("display", "block");
        d3.select("#h-motto").text(d.motto || "Family, Duty, Honor");
        d3.select("#h-seat").text(d.seat || "Various");
        d3.select("#c-char-img").style("background-image", `url(${d.img})`);
    } else {
        d3.select("#p-content").style("display", "block");
        d3.select("#h-content").style("display", "none");
        d3.select("#c-spouse").text(d.spouse || "N/A");
        d3.select("#c-str").text(d.str || "Lineage");
        d3.select("#c-weak").text(d.weak || "Mortal");
        d3.select("#c-death").text(d.death || "Dead").style("color", d.death === 'Alive' ? '#00ffaa' : '#ff4444');
        d3.select("#c-char-img").style("background-image", `url(${d.img || "https://img.icons8.com/color/100/user-male-circle.png"})`);
    }

    // Position the card with boundary checks
    let x = e.pageX + 20;
    let y = e.pageY + 20;
    const cardWidth = 320;
    const cardHeight = 420;
    const margin = 10;

    if (x + cardWidth > window.innerWidth) {
        x = window.innerWidth - cardWidth - margin;
    }
    if (y + cardHeight > window.innerHeight) {
        y = window.innerHeight - cardHeight - margin;
    }
    if (x < margin) x = margin;
    if (y < margin) y = margin;

    card.style("left", x + "px").style("top", y + "px").style("visibility", "visible");
}

function hideCard() { d3.select("#stat-card").style("visibility", "hidden"); }
function toggleTeam() {
    const isVis = d3.select("#team-modal").style("display") === "block";
    d3.select("#team-modal").style("display", isVis ? "none" : "block");
    d3.select("#overlay").style("display", isVis ? "none" : "block");
}
function resetView() { svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.scale(0.5)); }
</script>
</body>
</html>
