<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Westeros: Obsidian Dynasty</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ff6633; 
            --glow: rgba(255, 102, 51, 0.4); 
            --bg: #020202; 
            --line-dark: #3a1a0a;
        }
        
        body { 
            margin: 0; 
            background: var(--bg);
            color: var(--gold); 
            font-family: 'Cinzel', serif; 
            font-weight: 400; 
            overflow: hidden;
            text-shadow: 0 0 5px rgba(255, 204, 51, 0.3);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://wallpapercave.com/wp/wp13023970.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.5;
            z-index: -3;
        }
        #stars-far {
            position: fixed; inset: -10%; width: 120%; height: 120%;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.3; z-index: -2;
        }
        #stars-near {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            background-image: radial-gradient(2px 2px at 50px 160px, var(--gold), rgba(0,0,0,0));
            background-size: 400px 400px; opacity: 0.15; z-index: -1;
        }

        .ui-panel { position: absolute; z-index: 100; }
        .top-right { top: 30px; right: 30px; display: flex; gap: 15px; }
        .top-left { top: 30px; left: 30px; border-left: 3px solid var(--gold); padding-left: 15px; }

        button { 
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(20,20,20,0.9)); 
            border: 2px solid var(--gold); color: var(--gold);
            padding: 14px 28px; cursor: pointer; font-family: 'Cinzel'; font-weight: 600; transition: all 0.4s ease;
            text-transform: uppercase; font-size: 0.85em; letter-spacing: 2px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button:hover { 
            background: linear-gradient(135deg, var(--gold), #ffaa00); 
            color: #000; 
            box-shadow: 0 0 40px var(--glow), 0 6px 20px rgba(0,0,0,0.7);
            transform: translateY(-2px);
        }

        #team-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 340px; background: linear-gradient(135deg, rgba(5,5,5,0.98), rgba(15,15,15,0.98)); 
            border: 2px solid var(--gold); border-radius: 15px;
            padding: 40px; display: none; z-index: 3000; text-align: center;
            box-shadow: 0 0 120px #000, 0 0 30px var(--glow);
        }
        .team-list { 
            font-family: 'Quicksand', sans-serif; font-size: 1.1em; font-weight: 500;
            letter-spacing: 3px; line-height: 2.8; color: #fff; margin: 30px 0;
        }

        #stat-card {
            position: fixed; visibility: hidden; width: 340px; border-radius: 12px;
            background: linear-gradient(135deg, #000, #111); border: 2px solid var(--gold);
            z-index: 2000; pointer-events: none;
            box-shadow: 0 0 60px rgba(0,0,0,1), inset 0 0 20px rgba(255,204,51,0.1), 0 10px 30px rgba(0,0,0,0.8);
        }
        .card-header { 
            height: 200px; position: relative; border-bottom: 2px solid var(--gold); 
            background: linear-gradient(135deg, #080808, #0a0a0a); overflow: hidden; border-radius: 10px 10px 0 0;
        }
        .char-img { 
            position: absolute; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; z-index: 1; 
            filter: brightness(1.1) contrast(1.05);
        }
        .house-mini { 
            position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; z-index: 3; 
            filter: drop-shadow(0 0 10px #000) brightness(1.2); border-radius: 50%; border: 1px solid var(--gold);
        }
        .card-body { 
            padding: 30px; background: linear-gradient(135deg, #050505, #0a0a0a); border-radius: 0 0 10px 10px;
        }
        .card-name { 
            font-size: 1.6em; color: #fff; letter-spacing: 2px; font-weight: 700; display: block; margin-bottom: 18px; 
            border-bottom: 2px solid #333; padding-bottom: 10px; text-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .card-row { 
            font-size: 0.85em; margin-bottom: 14px; font-family: 'Quicksand', sans-serif; font-weight: 500; display: flex;
        }
        .card-label { 
            color: var(--gold); font-weight: 700; width: 110px; text-transform: uppercase; font-size: 0.7em; letter-spacing: 1.5px; flex-shrink: 0;
            text-shadow: 0 0 5px var(--glow);
        }
        .card-val { color: #eee; line-height: 1.5; text-shadow: 0 0 3px rgba(255,255,255,0.2); }
        .card-desc {
            font-family: 'Quicksand', sans-serif; font-size: 0.85em; line-height: 1.6;
            color: #ccc; margin-top: 18px; padding-top: 15px; border-top: 1px dashed #444; font-style: italic;
        }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 2900; backdrop-filter: blur(8px); }

        /* REDUCED LINE WIDTHS AS REQUESTED */
        .link-blood { 
            stroke: var(--line-dark); stroke-width: 6px; opacity: 0.8; transition: opacity 0.4s ease;
        }
        .link-marriage { 
            stroke: #ff3366; stroke-width: 7px; stroke-dasharray: 8, 5; opacity: 0.7; transition: opacity 0.4s ease;
        }
        
        /* NEW CLASSES FOR THE FOCUS / FILTER MODE */
        .node-faded {
            opacity: 0.15;
            filter: grayscale(100%);
            pointer-events: none;
            transition: all 0.4s ease;
        }
        .link-faded {
            opacity: 0.05;
            transition: all 0.4s ease;
        }
    </style>
</head>

<div id="stars-near"></div>

            <div class="card-desc" id="h-desc"></div>
        </div>
    </div>
</div>

    { "id": "GREY", "name": "House Greyjoy", "parent": "IT", "type": "house", "size": 130, "img": "https://awoiaf.westeros.org/images/thumb/5/5b/House_Greyjoy.svg/250px-House_Greyjoy.svg.png", "desc": "Ironborn reavers who sow no crops, preferring to pay the iron price for what they take." },
    { "id": "quellon", "name": "Quellon", "parent": "GREY", "size": 95, "str": "Reform", "weak": "Death", "death": "Dead", "spouse": "Multiple", "desc": "A forward-thinking lord who tried to bring his savage people into mainland civilization.","img":"https://static.wikia.nocookie.net/gameofthrones/images/b/b1/Quellon-Greyjoy.png/revision/latest?cb=20191127140007" },

    { "id": "hoster", "name": "Hoster", "parent": "TULL", "size": 95, "str": "Protocol", "weak": "Regrets", "death": "Dead", "spouse": "Minisa Whent", "desc": "A proud lord who secured powerful alliances through the strategic marriages of his daughters.","img":"https://awoiaf.westeros.org/images/thumb/1/1d/Jonathan_Standing_HosterT.jpg/350px-Jonathan_Standing_HosterT.jpg" },
    { "id": "catelyn", "name": "Catelyn", "parent": "hoster", "size": 90, "str": "Duty", "weak": "Family", "death": "Dead", "spouse": "Ned", "married_to": ["ned"], "desc": "Fiercely devoted to her children, she made fateful choices that ignited continent-wide war.","img":"https://static.wikia.nocookie.net/gameofthrones/images/d/d8/CatelynS3Promo.jpg/revision/latest?cb=20190427043743" },

  ]
};

const nodes = data.nodes;
const links = [];

nodes.forEach(d => {
    if (d.parent) links.push({ source: d.parent, target: d.id, relation: "blood" });
    if (d.married_to) {
        d.married_to.forEach(spouseId => {
            const exists = links.find(l => 
                (l.source === spouseId && l.target === d.id) || 
                (l.source === d.id && l.target === spouseId && l.relation === "marriage")
            );
            if (!exists) links.push({ source: d.id, target: spouseId, relation: "marriage" });
        });
    }
});

nodes.forEach(d => {
    d.x = (Math.random() - 0.5) * width;
    d.y = (Math.random() - 0.5) * height;
});

const zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", e => {
    g.attr("transform", e.transform);
    d3.select("#stars-far").style("transform", `translate(${e.transform.x * 0.05}px, ${e.transform.y * 0.05}px)`);
    d3.select("#stars-near").style("transform", `translate(${e.transform.x * 0.1}px, ${e.transform.y * 0.1}px)`);
});

const svg = d3.select("#viz").append("svg").attr("viewBox", [-width/2, -height/2, width, height]).call(zoom);
const g = svg.append("g");

const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id)
        .distance(d => d.source.type === 'center' ? 400 : d.relation === 'marriage' ? 300 : 120)
        .strength(d => d.source.type === 'center' ? 1 : d.relation === 'marriage' ? 0.15 : 0.8)
    )
    .force("charge", d3.forceManyBody().strength(-6000)) 
    .force("collide", d3.forceCollide().radius(d => (d.size / 2) + 40).iterations(3)) 
    .force("x", d3.forceX(0).strength(0.03))
    .force("y", d3.forceY(0).strength(0.03));

const link = g.append("g").selectAll("line").data(links).join("line")
    .attr("class", d => d.relation === "marriage" ? "link-marriage" : "link-blood");

function getDescendants(nodeId, allNodes) {
    let descendants = [nodeId];
    const children = allNodes.filter(n => n.parent === nodeId);
    children.forEach(child => {
        descendants = descendants.concat(getDescendants(child.id, allNodes));
    });
    return descendants;
}

const node = g.append("g").selectAll("g").data(nodes).join("g")
    .call(d3.drag()
        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("mouseenter", showCard)
    .on("mouseleave", hideCard)
    .on("click", (e, d) => {
        e.stopPropagation(); 
        
        if (d.id === 'IT') {
            resetFocus();
            return;
        }

        // Trace back to the root house
        let houseNode = d;
        while (houseNode.parent && houseNode.parent !== 'IT') {
            let parentNode = nodes.find(n => n.id === houseNode.parent);
            if (parentNode) houseNode = parentNode;
            else break;
        }

        const familyMembers = getDescendants(houseNode.id, nodes);
        
        // Fading logic
        node.classed("node-faded", n => !familyMembers.includes(n.id) && n.id !== 'IT');
        link.classed("link-faded", l => !(familyMembers.includes(l.source.id) || familyMembers.includes(l.target.id)) && l.source.id !== 'IT');
        
        const transform = d3.zoomIdentity
            .translate(window.innerWidth / 2, window.innerHeight / 2)
            .scale(0.8)
            .translate(-houseNode.x, -houseNode.y);
        svg.transition().duration(750).call(zoom.transform, transform);
    });

node.append("circle").attr("r", d=>d.size/2).attr("fill", "#000").attr("stroke", "var(--gold)").attr("stroke-width", 2);
node.append("clipPath").attr("id", d=>"clip-"+d.id).append("circle").attr("r", d=>d.size/2);
node.append("image")
    .attr("xlink:href", d => d.img)
    .attr("clip-path", d => `url(#clip-${d.id})`)
    .attr("x", d => -d.size/2).attr("y", d => -d.size/2)
    .attr("width", d => d.size).attr("height", d => d.size)
    .attr("preserveAspectRatio", "xMidYMid slice")
    .style("pointer-events", "none"); 

function resetFocus() {
    node.classed("node-faded", false);
    link.classed("link-faded", false);
    simulation.alpha(0.5).restart();
}

svg.on("click", resetFocus);

simulation.on("tick", () => {
    const it = nodes.find(n => n.id === "IT");
    if(it) { it.x = 0; it.y = 0; }

    link.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
});

svg.call(zoom.transform, d3.zoomIdentity.scale(0.5));

function showCard(e, d) {
    if(d.id === 'IT') return;
    const card = d3.select("#stat-card");
    d3.select("#c-name").text(d.name);
    
    if(d.type === 'house') {
        d3.select("#p-content").style("display", "none");
        d3.select("#h-content").style("display", "block");
        d3.select("#h-motto").text(d.motto || "Family, Duty, Honor");
        d3.select("#h-seat").text(d.seat || "Various");
        d3.select("#h-desc").text(d.desc || "A noble house of Westeros.");
        d3.select("#c-char-img").style("background-image", `url(${d.img})`);
        d3.select("#c-house-mini").style("display", "none");
    } else {
        d3.select("#p-content").style("display", "block");
        d3.select("#h-content").style("display", "none");
        d3.select("#c-spouse").text(d.spouse || "N/A");
        d3.select("#c-str").text(d.str || "Lineage");
        d3.select("#c-weak").text(d.weak || "Mortal");
        d3.select("#c-death").text(d.death || "Dead").style("color", d.death === 'Alive' ? '#00ffaa' : '#ff4444');
        d3.select("#c-desc").text(d.desc || "A known figure in Westeros.");
        d3.select("#c-char-img").style("background-image", `url(${d.img || "https://img.icons8.com/color/100/user-male-circle.png"})`);
        
        let current = d;
        while (current && current.type !== 'house') {
            current = nodes.find(n => n.id === current.parent);
        }
        const houseImg = current ? current.img : "https://img.icons8.com/color/100/castle.png";
        d3.select("#c-house-mini").attr("src", houseImg).style("display", "block");
    }

    const cardWidth = 320;
    const cardHeight = 380; 
    const margin = 10;

    let x, y;

    if (e.pageX > window.innerWidth / 2) x = e.pageX - cardWidth - 20;
    else x = e.pageX + 20;

    if (e.pageY > window.innerHeight / 2) y = e.pageY - cardHeight - 20;
    else y = e.pageY + 20;

    if (x < margin) x = margin;
    if (y < margin) y = margin;
    if (x + cardWidth > window.innerWidth) x = window.innerWidth - cardWidth - margin;
    if (y + cardHeight > window.innerHeight) y = window.innerHeight - cardHeight - margin;

    card.style("left", x + "px").style("top", y + "px").style("visibility", "visible");
}

function hideCard() { d3.select("#stat-card").style("visibility", "hidden"); }
function toggleTeam() {
    const isVis = d3.select("#team-modal").style("display") === "block";
    d3.select("#team-modal").style("display", isVis ? "none" : "block");
    d3.select("#overlay").style("display", isVis ? "none" : "block");
}
function resetView() { 
    resetFocus();
    svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.scale(0.5));
}
</script>
